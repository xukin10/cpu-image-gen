version: '3.8'

services:
  cpu-image-gen:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../configs:/app/configs
      - ../output:/app/output
      - ../models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
